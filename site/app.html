<!DOCTYPE html>
<html lang="ko">
<head>
<title>Finance Ontology Platform</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#EDEFF3;color:#171B22;font-family:"Pretendard","Pretendard Variable","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:"tnum" 0}
  button{font-family:inherit;color:inherit}
  ::selection{background:#C9D6FF}
  *::-webkit-scrollbar{width:11px;height:11px}
  *::-webkit-scrollbar-thumb{background:#C7CDD8;border-radius:8px;border:3px solid transparent;background-clip:content-box}
  *::-webkit-scrollbar-thumb:hover{background:#AEB6C4;background-clip:content-box}
  *::-webkit-scrollbar-track{background:transparent}
  .mono{font-family:"Geist Mono",ui-monospace,"SFMono-Regular","IBM Plex Mono",monospace;font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums;letter-spacing:-0.008em}
  @keyframes fo-spin{to{transform:rotate(360deg)}}
  @keyframes fo-pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes fo-shimmer{0%{background-position:-360px 0}100%{background-position:360px 0}}
  @keyframes fo-dash{to{stroke-dashoffset:-16}}
  @keyframes fo-fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @keyframes fo-scalein{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
  @keyframes fo-progshine{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
  @keyframes fo-ringpulse{0%{box-shadow:0 0 0 0 rgba(43,80,216,.4)}70%{box-shadow:0 0 0 7px rgba(43,80,216,0)}100%{box-shadow:0 0 0 0 rgba(43,80,216,0)}}
  @keyframes fo-stepin{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  .fo-skel{background:linear-gradient(90deg,#EAECF1 25%,#F3F5F8 50%,#EAECF1 75%);background-size:720px 100%;animation:fo-shimmer 1.3s infinite linear;border-radius:5px}
</style>
<style>
[data-hv="0"]:hover{background:#F2F4F7 !important}
[data-hv="1"]:hover{background:#F4F6F9 !important}
[data-hv="2"]:hover{color:#23272F !important}
[data-hv="3"]:hover{background:#2545C0 !important}
[data-hv="4"]:hover{border-color:#B9C1D0 !important}
[data-hv="5"]:hover{background:#F8F9FB !important}
[data-hv="6"]:hover{background:#EAF0FF !important}
[data-hv="7"]:hover{background:#FBE7E9 !important}
[data-hv="8"]:hover{background:#5B3FE0 !important}
[data-hv="9"]:hover{border-color:#D5DAE2 !important}
[data-hv="10"]:hover{background:#0C8A5F !important}
</style>
</head>
<body>
<div id="app"></div>
<template id="tpl">
<div style="display:flex;flex-direction:column;height:100vh;min-height:0;overflow:hidden;background:#EDEFF3;color:#171B22">

  <!-- ======================= TOP BAR ======================= -->
  <header style="flex:none;height:54px;display:flex;align-items:center;gap:0;padding:0 18px;background:#FFFFFF;border-bottom:1px solid #E4E7ED;position:relative;z-index:40">
    <div style="flex:none;width:232px;display:flex;align-items:center;gap:10px;padding-right:16px">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <circle cx="13" cy="5" r="3.1" fill="#2B50D8"></circle>
        <circle cx="5.2" cy="19" r="3.1" fill="#6B4DF5"></circle>
        <circle cx="20.8" cy="19" r="3.1" fill="#0E9F6E"></circle>
        <path d="M13 8 L6.4 16.4 M13 8 L19.6 16.4 M8 19 L18 19" stroke="#C2C9D6" stroke-width="1.5"></path>
      </svg>
      <div style="display:flex;flex-direction:column;line-height:1.05">
        <span style="font-size:14.5px;font-weight:700;letter-spacing:-.2px">Finance Ontology</span>
        <span style="font-size:9.5px;font-weight:600;letter-spacing:.12em;color:#8B93A3;text-transform:uppercase">AI Automation Platform</span>
      </div>
    </div>
    <div style="width:1px;height:26px;background:#E4E7ED"></div>
    <div style="position:relative;margin-left:14px">
      <button data-ev-click="{{ tenantToggle }}" style="display:flex;align-items:center;gap:9px;height:36px;padding:0 12px;border:1px solid #E4E7ED;border-radius:8px;background:#FBFBFC;cursor:pointer" data-hv="0">
        <span style="display:grid;place-items:center;width:22px;height:22px;border-radius:5px;background:#EAF0FF;color:#2B50D8;font-size:11px;font-weight:700">한</span>
        <span style="display:flex;flex-direction:column;align-items:flex-start;line-height:1.1">
          <span style="font-size:12.5px;font-weight:600">㈜한빛리테일</span>
          <span style="font-size:9.5px;color:#8B93A3">유통 · Tenant #RTL-0042</span>
        </span>
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="margin-left:2px"><path d="M4 6l4 4 4-4" stroke="#8B93A3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </button>
      <sc-if value="{{ tenantOpen }}"><div data-ev-click="{{ tenantClose }}" style="position:fixed;inset:0;z-index:40"></div><div style="position:absolute;top:42px;left:0;min-width:272px;background:#fff;border:1px solid #E4E7ED;border-radius:11px;box-shadow:0 14px 34px rgba(20,24,31,.16);padding:6px;z-index:50;{{ tenantAnim }}">
        <div style="padding:8px 11px 7px;font-size:10px;font-weight:700;letter-spacing:.08em;color:#A2AAB8;text-transform:uppercase">테넌트 전환</div>
        <sc-for list="{{ tenants }}" as="t" hint-placeholder-count="3">
          <button data-ev-click="{{ t.go }}" style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;margin-bottom:2px;border:none;background:{{ t.bg }};border-radius:8px;cursor:pointer;text-align:left" data-hv="1">
            <span style="display:grid;place-items:center;width:26px;height:26px;border-radius:6px;background:{{ t.iconBg }};color:{{ t.iconFg }};font-size:11px;font-weight:700;flex:none">{{ t.initial }}</span>
            <span style="flex:1;display:flex;flex-direction:column;line-height:1.2"><span style="font-size:12.5px;font-weight:600;color:#23272F">{{ t.name }}</span><span style="font-size:10px;color:#8B93A3">{{ t.meta }}</span></span>
            <sc-if value="{{ t.current }}"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="flex:none"><path d="M2.5 8.5l3.5 3.5 7.5-8" stroke="#2B50D8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg></sc-if>
          </button>
        </sc-for>
        <div style="margin-top:4px;padding:9px 11px 6px;border-top:1px solid #EEF0F4;font-size:10.5px;color:#8B93A3;line-height:1.5">데모 환경에서는 ㈜한빛리테일 테넌트만 활성화되어 있습니다.</div>
      </div></sc-if>
    </div>

    <!-- persona / screen switcher -->
    <div style="flex:1;display:flex;justify-content:center;align-items:center;gap:9px">
      <span title="심사 편의를 위한 데모 장치입니다. 실제 제품에서는 워크스페이스가 역할(RBAC) 기반으로 노출되며, 온보딩은 셋업 완료 시 헤더에서 사라집니다." style="flex:none;font-size:10px;font-weight:700;letter-spacing:.05em;color:#8B93A3;border:1px dashed #C7CDD8;border-radius:99px;padding:3px 9px;white-space:nowrap;cursor:help">데모 · 화면 전환</span>
      <div style="display:flex;gap:3px;padding:4px;background:#F0F2F6;border:1px solid #E4E7ED;border-radius:11px">
        <button data-ev-click="{{ setApp.admin }}" style="position:relative;display:flex;align-items:center;gap:7px;height:34px;padding:0 15px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:#545C6B;white-space:nowrap;flex:none">
          <sc-if value="{{ appIs.admin }}" hint-placeholder-val="{{ true }}"><span style="position:absolute;inset:0;background:#FFFFFF;border-radius:8px;box-shadow:0 1px 2px rgba(20,24,31,.09),0 0 0 1px rgba(20,24,31,.04)"></span></sc-if>
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" style="position:relative"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"></rect><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"></rect><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"></rect><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"></rect></svg>
          <span style="position:relative">관리자 콘솔</span>
        </button>
        <button data-ev-click="{{ setApp.reviewer }}" style="position:relative;display:flex;align-items:center;gap:7px;height:34px;padding:0 15px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:#545C6B;white-space:nowrap;flex:none">
          <sc-if value="{{ appIs.reviewer }}"><span style="position:absolute;inset:0;background:#FFFFFF;border-radius:8px;box-shadow:0 1px 2px rgba(20,24,31,.09),0 0 0 1px rgba(20,24,31,.04)"></span></sc-if>
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" style="position:relative"><path d="M2 4.5h12M2 8h12M2 11.5h7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path></svg>
          <span style="position:relative">검토자</span>
        </button>
        <button data-ev-click="{{ setApp.onboarding }}" style="position:relative;display:flex;align-items:center;gap:7px;height:34px;padding:0 15px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:#545C6B;white-space:nowrap;flex:none">
          <sc-if value="{{ appIs.onboarding }}"><span style="position:absolute;inset:0;background:#FFFFFF;border-radius:8px;box-shadow:0 1px 2px rgba(20,24,31,.09),0 0 0 1px rgba(20,24,31,.04)"></span></sc-if>
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" style="position:relative"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"></circle></svg>
          <span style="position:relative">고객사 온보딩</span>
        </button>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:6px">
      <button data-ev-click="{{ openSearch }}" style="display:flex;align-items:center;gap:8px;height:34px;padding:0 11px 0 10px;border:1px solid #E4E7ED;border-radius:8px;background:#FBFBFC;cursor:pointer;color:#8B93A3" data-hv="0">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"></circle><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path></svg>
        <span style="font-size:11.5px;font-weight:500">검색</span>
        <span class="mono" style="font-size:10px;padding:1px 5px;border:1px solid #E4E7ED;border-radius:4px;background:#fff">⌘K</span>
      </button>
      <div style="position:relative">
        <button data-ev-click="{{ notifToggle }}" style="position:relative;display:grid;place-items:center;width:34px;height:34px;border:1px solid #E4E7ED;border-radius:8px;background:#FBFBFC;cursor:pointer;color:#545C6B" data-hv="0">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2a4 4 0 0 0-4 4v2.5L3 11h10l-1-2.5V6a4 4 0 0 0-4-4z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"></path><path d="M6.5 13a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.4"></path></svg>
          <sc-if value="{{ hasUnread }}"><span style="position:absolute;top:7px;right:8px;width:6px;height:6px;border-radius:50%;background:#DA2C38;border:1.5px solid #FBFBFC"></span></sc-if>
        </button>
        <sc-if value="{{ notifOpen }}"><div data-ev-click="{{ notifClose }}" style="position:fixed;inset:0;z-index:40"></div><div style="position:absolute;top:42px;right:0;width:348px;background:#fff;border:1px solid #E4E7ED;border-radius:12px;box-shadow:0 14px 34px rgba(20,24,31,.16);padding:6px;z-index:50;{{ notifAnim }}">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 11px 9px;border-bottom:1px solid #EEF0F4;margin-bottom:5px">
            <span style="font-size:12.5px;font-weight:700;color:#171B22">알림 <span style="font-weight:600;color:#8B93A3">· {{ notifCountLabel }}</span></span>
            <button data-ev-click="{{ notifReadAll }}" style="height:24px;padding:0 9px;border:1px solid #E4E7ED;border-radius:6px;background:#FBFBFC;cursor:pointer;font-size:10.5px;font-weight:600;color:#545C6B" data-hv="1">모두 읽음</button>
          </div>
          <sc-for list="{{ notifs }}" as="n" hint-placeholder-count="4">
            <button data-ev-click="{{ n.open }}" style="display:flex;align-items:flex-start;gap:10px;width:100%;padding:10px 11px;margin-bottom:2px;border:none;background:{{ n.bg }};border-radius:9px;cursor:pointer;text-align:left" data-hv="1">
              <span style="display:grid;place-items:center;width:28px;height:28px;border-radius:8px;background:{{ n.iconBg }};color:{{ n.iconFg }};font-size:12px;font-weight:800;flex:none">{{ n.icon }}</span>
              <span style="flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.35">
                <span style="font-size:12.5px;font-weight:600;color:#23272F">{{ n.title }}</span>
                <span style="font-size:11px;color:#8B93A3">{{ n.meta }}</span>
                <span style="margin-top:3px;font-size:10px;color:#A4AEBE">{{ n.time }}</span>
              </span>
              <sc-if value="{{ n.unread }}"><span style="margin-top:4px;width:7px;height:7px;border-radius:50%;background:#2B50D8;flex:none"></span></sc-if>
            </button>
          </sc-for>
          <button data-ev-click="{{ notifViewAll }}" style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;height:34px;margin-top:4px;border:none;border-top:1px solid #EEF0F4;background:transparent;cursor:pointer;font-size:11.5px;font-weight:600;color:#2B50D8" data-hv="1">감사 로그에서 전체 이력 보기 →</button>
        </div></sc-if>
      </div>
      <div style="position:relative">
        <div data-ev-click="{{ userMenuToggle }}" style="display:flex;align-items:center;gap:9px;height:34px;padding:0 8px 0 4px;border-radius:8px;cursor:pointer" data-hv="0">
          <span style="display:grid;place-items:center;width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#2B50D8,#6B4DF5);color:#fff;font-size:11px;font-weight:700">승</span>
          <span style="display:flex;flex-direction:column;line-height:1.15">
            <span style="font-size:12px;font-weight:600">김승욱</span>
            <span style="font-size:9.5px;color:#8B93A3">기획팀</span>
          </span>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="margin-left:1px;color:#A4AEBE"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        </div>
        <sc-if value="{{ userMenuOpen }}"><div data-ev-click="{{ userMenuClose }}" style="position:fixed;inset:0;z-index:40"></div><div style="position:absolute;top:42px;right:0;min-width:212px;background:#fff;border:1px solid #E4E7ED;border-radius:11px;box-shadow:0 14px 34px rgba(20,24,31,.16);padding:6px;z-index:50">
          <div style="padding:9px 11px 10px;border-bottom:1px solid #EEF0F4;margin-bottom:5px">
            <div style="font-size:12.5px;font-weight:700;color:#171B22">김승욱</div>
            <div style="font-size:11px;color:#8B93A3;margin-top:2px">기획팀</div>
          </div>
          <button data-ev-click="{{ goProfile }}" style="display:flex;align-items:center;gap:9px;width:100%;height:34px;padding:0 11px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;color:#3D4658;text-align:left" data-hv="1">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.6" stroke="currentColor" stroke-width="1.4"></circle><path d="M3.5 13c0-2.2 2-3.6 4.5-3.6S12.5 10.8 12.5 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path></svg>
            <span>내 정보</span>
          </button>
          <button data-ev-click="{{ logout }}" style="display:flex;align-items:center;gap:9px;width:100%;height:34px;padding:0 11px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;color:#DA2C38;text-align:left" data-hv="1">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M6 2H3.5A1.5 1.5 0 0 0 2 3.5v9A1.5 1.5 0 0 0 3.5 14H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path><path d="M10 11l3-3-3-3M13 8H6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <span>로그아웃</span>
          </button>
        </div></sc-if>
      </div>
    </div>
  </header>

  <div style="flex:1;min-height:0;display:flex">

    <!-- ======================= ADMIN CONSOLE ======================= -->
    <sc-if value="{{ isAdmin }}" hint-placeholder-val="{{ true }}">
    <div style="display:flex;width:100%;height:100%;min-height:0">

      <!-- SIDEBAR -->
      <nav style="flex:none;width:250px;background:#FFFFFF;border-right:1px solid #E4E7ED;display:flex;flex-direction:column;min-height:0">
        <div style="flex:1;overflow-y:auto;padding:14px 12px 8px">
          <div style="padding:6px 10px 7px;font-size:10px;font-weight:700;letter-spacing:.1em;color:#A2AAB8;text-transform:uppercase">성과 운영 · Performance</div>

          <button data-ev-click="{{ navGo.dashboard }}" style="position:relative;display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;margin-bottom:2px;border:none;background:transparent;border-radius:8px;cursor:pointer;text-align:left" data-hv="1">
            <sc-if value="{{ navIs.dashboard }}" hint-placeholder-val="{{ true }}"><span style="position:absolute;inset:0;background:#EAF0FF;border:1px solid #D3DFF8;border-radius:8px"></span></sc-if>
            <svg width="17" height="17" viewBox="0 0 16 16" fill="none" style="position:relative;color:#4A5568;flex:none"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"></rect><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"></rect><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"></rect><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"></rect></svg>
            <span style="position:relative;display:flex;flex-direction:column;line-height:1.25"><span style="font-size:13.5px;font-weight:600;color:#23272F">대시보드</span><span style="font-size:10px;color:#9AA2B1">Dashboard</span></span>
          </button>

          <button data-ev-click="{{ navGo.metering }}" style="position:relative;display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;margin-bottom:2px;border:none;background:transparent;border-radius:8px;cursor:pointer;text-align:left" data-hv="1">
            <sc-if value="{{ navIs.metering }}"><span style="position:absolute;inset:0;background:#EAF0FF;border:1px solid #D3DFF8;border-radius:8px"></span></sc-if>
            <svg width="17" height="17" viewBox="0 0 16 16" fill="none" style="position:relative;color:#4A5568;flex:none"><path d="M2 11a6 6 0 0 1 12 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path><path d="M8 11l3-3.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path><circle cx="8" cy="11" r="1" fill="currentColor"></circle></svg>
            <span style="position:relative;display:flex;flex-direction:column;line-height:1.25"><span style="font-size:13.5px;font-weight:600;color:#23272F">미터링</span><span style="font-size:10px;color:#9AA2B1">Metering</span></span>
          </button>

          <div style="padding:16px 10px 7px;font-size:10px;font-weight:700;letter-spacing:.1em;color:#A2AAB8;text-transform:uppercase">온톨로지 · Knowledge</div>

          <button data-ev-click="{{ navGo.ontology }}" style="position:relative;display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;margin-bottom:2px;border:none;background:transparent;border-radius:8px;cursor:pointer;text-align:left" data-hv="1">
            <sc-if value="{{ navIs.ontology }}"><span style="position:absolute;inset:0;background:#EAF0FF;border:1px solid #D3DFF8;border-radius:8px"></span></sc-if>

<script>

/* ===== mini DC runtime ===== */
class DCLogic {
  constructor(props){ this.props = props || {}; }
  setState(patch){
    const p = typeof patch === 'function' ? patch(this.state) : patch;
    Object.assign(this.state, p);
    scheduleRender();
  }
}

const EXPR = /\{\{\s*([^}]+?)\s*\}\}/g;
let C, H = [], renderQueued = false, warned = new Set();

function resolvePath(expr, scopes){
  if (expr === 'true') return true;
  if (expr === 'false') return false;
  if (/^-?[\d.]+$/.test(expr)) return Number(expr);
  const parts = expr.split('.');
  for (let i = scopes.length - 1; i >= 0; i--) {
    if (parts[0] in scopes[i]) {
      let v = scopes[i];
      for (const p of parts) { if (v == null) return undefined; v = v[p]; }
      return v;
    }
  }
  if (!warned.has(expr)) { warned.add(expr); console.warn('[dc] unresolved:', expr); }
  return undefined;
}
const subst = (s, scopes) => s.replace(EXPR, (m, e) => {
  const v = resolvePath(e, scopes);
  return v == null ? '' : String(v);
});

function processNode(node, scopes){
  if (node.nodeType === Node.TEXT_NODE) {
    if (node.nodeValue.includes('{{')) node.nodeValue = subst(node.nodeValue, scopes);
    return;
  }
  if (node.nodeType !== Node.ELEMENT_NODE) return;
  const tag = node.tagName.toLowerCase();

  if (node.hasAttribute('data-sc-list')) {
    const list = resolvePath(node.getAttribute('data-sc-list'), scopes) || [];
    const as = node.getAttribute('data-sc-as') || 'item';
    const frag = document.createDocumentFragment();
    for (const item of list) {
      const cl = node.cloneNode(true);
      cl.removeAttribute('data-sc-list'); cl.removeAttribute('data-sc-as');
      const scope = {}; scope[as] = item;
      processNode(cl, scopes.concat(scope));
      frag.appendChild(cl);
    }
    node.replaceWith(frag);
    return;
  }

  if (tag === 'sc-if') {
    const v = resolvePath(node.getAttribute('value').replace(EXPR, '$1').trim(), scopes);
    if (v) {
      const frag = document.createDocumentFragment();
      [...node.childNodes].forEach(ch => { frag.appendChild(ch); });
      [...frag.childNodes].forEach(ch => processNode(ch, scopes));
      node.replaceWith(frag);
    } else node.remove();
    return;
  }
  if (tag === 'sc-for') {
    const list = resolvePath(node.getAttribute('list').replace(EXPR, '$1').trim(), scopes) || [];
    const as = node.getAttribute('as') || 'item';
    const kids = [...node.childNodes];
    const frag = document.createDocumentFragment();
    for (const item of list) {
      const scope = {}; scope[as] = item;
      for (const k of kids) {
        const cl = k.cloneNode(true);
        frag.appendChild(cl);
      }
      /* 방금 추가된 이 아이템의 클론들 처리 */
      const added = [...frag.childNodes].slice(-kids.length);
      added.forEach(ch => processNode(ch, scopes.concat(scope)));
    }
    node.replaceWith(frag);
    return;
  }

  for (const attr of [...node.attributes]) {
    if (!attr.value.includes('{{')) continue;
    if (attr.name === 'data-ev-click' || attr.name === 'data-ev-input') {
      const fn = resolvePath(attr.value.replace(EXPR, '$1').trim(), scopes);
      if (typeof fn === 'function') node.setAttribute(attr.name, String(H.push(fn) - 1));
      else node.removeAttribute(attr.name);
    } else {
      const v = subst(attr.value, scopes);
      node.setAttribute(attr.name, v);
      if (attr.name === 'value' && 'value' in node) node.value = v;
    }
  }
  [...node.childNodes].forEach(ch => processNode(ch, scopes));
}

const tplEl = document.getElementById('tpl');
const rootEl = document.getElementById('app');

function render(){
  H = [];
  const frag = tplEl.content.cloneNode(true);
  const vals = C.renderVals();
  [...frag.childNodes].forEach(ch => processNode(ch, [vals]));
  rootEl.replaceChildren(frag);
}
function scheduleRender(){
  if (renderQueued) return;
  renderQueued = true;
  queueMicrotask(() => { renderQueued = false; render(); });
}

rootEl.addEventListener('click', e => {
  const el = e.target.closest('[data-ev-click]');
  if (!el) return;
  const fn = H[+el.getAttribute('data-ev-click')];
  if (fn) fn(e);
});
rootEl.addEventListener('change', e => {
  const el = e.target.closest('[data-ev-input]');
  if (!el) return;
  const fn = H[+el.getAttribute('data-ev-input')];
  if (fn) fn(e);
});
rootEl.addEventListener('input', e => {
  const el = e.target.closest('[data-ev-input]');
  if (!el) return;
  const fn = H[+el.getAttribute('data-ev-input')];
  if (fn) fn(e);
});

  startScreen: ['admin','reviewer','onboarding'].includes(q.get('screen')) ? q.get('screen') : 'admin',
  reviewerWorkflow: ['card','invoice'].includes(q.get('wf')) ? q.get('wf') : 'card',
  onboardingStep: Math.min(7, Math.max(1, parseInt(q.get('step') || '2', 10) || 2)),
  adminTab: ['dashboard','ontology','workflow','policy','roles','integration','audit','metering'].includes(q.get('tab')) ? q.get('tab') : 'dashboard',
};
C = new Component(props);
render();
if (C.componentDidMount) C.componentDidMount();

</script>
